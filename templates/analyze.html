{% extends "base.html" %}
{% block title %}Analizza • CV Analyzer{% endblock %}

{% block content %}
  <h1>Analizza</h1>

  <div class="card soft">
    <span class="badge">Tip</span>
    <span class="badge">Incolla un annuncio completo (requisiti, nice to have, responsabilità)</span>
  </div>

  <div style="height:12px"></div>

  <form method="post" class="card">
    <label>Job description</label>
    <textarea name="job" rows="10" placeholder="Incolla qui l'annuncio di lavoro..."></textarea>

    <div class="actions">
      <button class="btn" type="submit">Analizza</button>
      <a class="btn secondary" href="{{ url_for('skills') }}">Gestisci skill</a>
    </div>
  </form>
{% endblock %}
