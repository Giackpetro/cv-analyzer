<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}CV Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <nav class="nav">
      <a class="brand" href="{{ url_for('home') }}">
        <span class="brand-dot"></span>
        <span>CV Analyzer</span>
      </a>

      <div class="nav-links">
        <a class="link" href="{{ url_for('profile') }}">Profilo</a>
        <a class="link" href="{{ url_for('skills') }}">Skill</a>
        <a class="link" href="{{ url_for('analyze_page') }}">Analizza</a>
      </div>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
    <div class="footer">Progetto didattico • Python + Flask + NLP</div>
  </main>
</body>
</html>
